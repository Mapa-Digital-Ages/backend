name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main", "dev" ]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Run Ruff (lint, fail on any violation)
        run: uv run ruff check . --no-fix

      - name: Run Ruff format check
        run: uv run ruff format --check .

  tests-and-coverage:
    name: Tests & Coverage (>= 70%)
    runs-on: ubuntu-latest

    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        volumes:
          - /tmp/minio-data:/data
        command: server /data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Create MinIO test bucket
        run: |
          pip install awscli --quiet
          aws --endpoint-url http://localhost:9000 \
              --region us-east-1 \
              s3 mb s3://test-bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin

      - name: Run tests with coverage gate (unittest)
        run: |
          uv run coverage run -m unittest discover -s .
          uv run coverage run -a -m unittest discover -s . -p "test_s3*.py"
          uv run coverage report -m --fail-under=70
        env:
          STORAGE_BACKEND: s3
          AWS_S3_BUCKET: test-bucket
          AWS_S3_REGION: us-east-1
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_S3_ENDPOINT_URL: http://localhost:9000

  type-check:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Run Pyright
        run: uv run pyright src/
