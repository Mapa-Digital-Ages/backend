name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-compile:
    name: Build & Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Compile check (syntax)
        run: uv run python -m compileall -q .

  tests-and-coverage:
    name: Tests & Coverage (>= 70%)
    runs-on: ubuntu-latest
    needs: build-and-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Run tests with coverage gate (unittest)
        run: |
          uv run coverage run -m unittest discover -s .
          uv run coverage report -m --fail-under=70

  type-check:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest
    needs: build-and-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: uv sync --dev --all-extras --frozen

      - name: Run Pyright
        run: uv run pyright src/

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: self-hosted
    needs: [tests-and-coverage, type-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar arquivo .env de Produção
        run: |
          echo "PYTHONPATH=src" > .env
          echo "TEST_VARIABLE=something" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRATION_MINUTES=30" >> .env
          
          echo "BASE_URL=http://3.128.24.232:8000" >> .env
          
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          
          echo "DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}" >> .env
          
          echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
          echo "PASSWORD_PEPPER=${{ secrets.PASSWORD_PEPPER }}" >> .env

      - name: Subir containers de produção
        run: |
          docker compose -f docker-compose-prod.yml down
          docker compose -f docker-compose-prod.yml up -d --build
